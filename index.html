<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing AI Prototype</title>
<style>
  body { margin: 0; background: #111; color: #fff; font-family: sans-serif; }
  #canvas { display: block; margin: 0 auto; cursor: crosshair; }
  #info { padding: 10px; text-align: center; font-size: 0.95rem; line-height: 1.8; }
  #status { color: #ffd600; font-weight: bold; }
</style>
</head>
<body>

<div id="info">
  <p>キーボードの四隅（Q→P→Z→？）→ F → J の順にクリックしてください</p>
  <p id="status">待機中…</p>
</div>

<video id="cam" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<!--
  ★ 修正① ES Module形式をやめ、<script>タグで読み込む
     MediaPipeのCDNはUMD形式のため、import文では動作しない
-->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
const video  = document.getElementById("cam");
const canvas = document.getElementById("canvas");
const ctx    = canvas.getContext("2d");
const status = document.getElementById("status");

// ------------------------------
// ① Webカメラ起動
//    ★ 修正② Camera ユーティリティを使って安定稼働
// ------------------------------
const camera = new Camera(video, {
  onFrame: async () => { await hands.send({ image: video }); },
  width: 640, height: 480
});

camera.start().then(() => {
  canvas.width  = 640;
  canvas.height = 480;
  status.textContent = "Q（左上）をクリック (0/4)";
});

// ------------------------------
// ② キャリブレーション状態
// ------------------------------

// クリック順: Q(左上)→P(右上)→Z(左下)→？(右下)→F→J
const CORNER_LABELS = ["Q（左上）", "P（右上）", "Z（左下）", "？（右下）"];

let clickStep      = 0;
let keyboardCorners = [];   // 四隅 [Q, P, Z, ？]
let F_pos          = null;
let J_pos          = null;
let keys           = [];    // 全キー座標

canvas.addEventListener("click", e => {
  // ★ 修正③ スケール補正を追加
  //    canvas の表示サイズ(CSS)と実ピクセルが異なる場合に座標がズレるため
  const rect   = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top)  * scaleY;

  // 四隅の取得（0〜3クリック目）
  if (clickStep < 4) {
    keyboardCorners.push({ x, y });
    clickStep++;
    if (clickStep < 4) {
      status.textContent = `${CORNER_LABELS[clickStep]} をクリック (${clickStep}/4)`;
    } else {
      generateKeyPositions();
      status.textContent = "次に F の位置をクリック";
    }
    return;
  }

  // F の位置（5クリック目）
  if (!F_pos) {
    F_pos = { x, y };
    // F_pos でキー配列の F 座標を上書き（より正確な位置に補正）
    const fKey = keys.find(k => k.key === "F");
    if (fKey) { fKey.x = x; fKey.y = y; }
    status.textContent = "次に J の位置をクリック";
    return;
  }

  // J の位置（6クリック目）
  if (!J_pos) {
    J_pos = { x, y };
    // J_pos でキー配列の J 座標を上書き（より正確な位置に補正）
    const jKey = keys.find(k => k.key === "J");
    if (jKey) { jKey.x = x; jKey.y = y; }
    status.textContent = "✅ キャリブレーション完了 — ホームポジション判定中";
    return;
  }
});

// ------------------------------
// ③ キー座標生成（QWERTY 3行）
//    ★ 修正④ ホームポジション行だけでなく Q〜？の全3行を生成
//             generateKeyPositions() を四隅取得後に呼ぶよう修正
// ------------------------------
function generateKeyPositions() {
  const [Q, P, Z, Hてん] = keyboardCorners; // Q=左上, P=右上, Z=左下, ？=右下

  // JIS配列 3行。rowOffset は物理的な段差（stagger）
  const KB_ROWS = [
    { keys: ["Q","W","E","R","T","Y","U","I","O","P"], rowOffset: 0.00 },
    { keys: ["A","S","D","F","G","H","J","K","L",";"], rowOffset: 0.05 },
    { keys: ["Z","X","C","V","B","N","M",",",".","/"], rowOffset: 0.12 },
  ];
  const NUM_ROWS = KB_ROWS.length;
  const MAX_COLS = Math.max(...KB_ROWS.map(r => r.keys.length));

  keys = [];

  KB_ROWS.forEach((row, ri) => {
    const rowT = ri / (NUM_ROWS - 1); // 0.0〜1.0（行方向の補間比率）

    // 行の左端・右端を四隅から線形補間
    const leftX  = Q.x + (Z.x - Q.x) * rowT;
    const leftY  = Q.y + (Z.y - Q.y) * rowT;
    const rightX = P.x + (Hてん.x - P.x) * rowT;
    const rightY = P.y + (Hてん.y - P.y) * rowT;

    row.keys.forEach((key, ci) => {
      const colT = (ci + row.rowOffset) / (MAX_COLS - 1); // 列方向の補間比率

      const x = leftX + (rightX - leftX) * colT;
      const y = leftY + (rightY - leftY) * colT;
      keys.push({ key, x, y });
    });
  });
}

// ------------------------------
// ④ 指→キー対応ロジック
// ------------------------------
function dist(ax, ay, bx, by) {
  return Math.hypot(ax - bx, ay - by);
}

function getNearestKey(fx, fy) {
  let minDist = Infinity, nearest = null;
  for (const k of keys) {
    const d = dist(fx, fy, k.x, k.y);
    if (d < minDist) { minDist = d; nearest = k; }
  }
  return nearest;
}

// ★ 修正⑤ 指番号の左右を修正
//
//  MediaPipe の landmark 番号と担当キーの正しい対応:
//
//    landmark番号  指         ホームキー
//    ───────────────────────────────────
//       8         左手人差し指   F
//      12         左手中指       D   ← 元コードは逆（8→F, 12→D が正しい）
//      16         左手薬指       S
//      20         左手小指       A
//      ────────────────────────────────
//       7         右手人差し指   J   ← 元コードは landmark 7 を右手としていたが
//      11         右手中指       K      MediaPipe は片手しか取らない場合、
//      15         右手薬指       L      左手として返すことが多いため
//      19         右手小指       ;      実際は同じ手の別の指になる
//
//  ※ maxNumHands:1 の場合、検出される手は1本のみ。
//     両手を同時に判定したい場合は maxNumHands:2 に変更し、
//     multiHandedness で左右を判別する必要がある。
//     今回は「左手のみ」の4本指ホームポジション判定とする。
//
const fingerToHome = {
  8:  "F",   // 人差し指先端
  12: "D",   // 中指先端
  16: "S",   // 薬指先端
  20: "A",   // 小指先端
};

// ホームポジション判定（指先がキー座標から threshold px 以内かどうか）
const THRESHOLD = 40; // px

function isOnHome(fx, fy, keyName) {
  // ★ 修正⑥ F_pos/J_pos を使わず keys[] の座標で判定
  //    元コードは F_pos/J_pos を取得したのに isOnHome() では keys[] を使っており、
  //    F_pos/J_pos が実際の判定に反映されていなかった。
  //    → F_pos/J_pos は generateKeyPositions() 後に keys[] を上書きしているため、
  //       keys[] を参照すれば常に最新の正確な座標が得られる。
  const k = keys.find(k => k.key === keyName);
  if (!k) return false;
  return dist(fx, fy, k.x, k.y) < THRESHOLD;
}

// ------------------------------
// ⑤ キー座標をCanvasに描画（デバッグ用）
// ------------------------------
function drawKeyOverlay() {
  for (const k of keys) {
    // ホームポジションキーは強調表示
    const isHome = Object.values(fingerToHome).includes(k.key);
    ctx.beginPath();
    ctx.arc(k.x, k.y, isHome ? 8 : 4, 0, Math.PI * 2);
    ctx.fillStyle   = isHome ? "rgba(0,200,255,0.3)" : "rgba(255,255,255,0.15)";
    ctx.strokeStyle = isHome ? "rgba(0,200,255,0.8)" : "rgba(255,255,255,0.4)";
    ctx.lineWidth   = 1;
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = isHome ? "rgba(0,200,255,0.9)" : "rgba(255,255,255,0.6)";
    ctx.font      = isHome ? "bold 10px monospace" : "9px monospace";
    ctx.fillText(k.key, k.x - 4, k.y + 3);
  }
}

// ------------------------------
// ⑥ MediaPipe Hands 設定
// ------------------------------
const hands = new Hands({
  locateFile: file =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

hands.onResults(results => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

  // キャリブレーション済みならキーグリッドを表示
  if (keys.length > 0) drawKeyOverlay();

  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) return;

  const landmarks = results.multiHandLandmarks[0];

  // 骨格描画
  drawConnectors(ctx, landmarks, HAND_CONNECTIONS, {
    color: "#00FF00", lineWidth: 3
  });
  drawLandmarks(ctx, landmarks, { color: "#FF0000", radius: 4 });

  // ホームポジション判定（F・J 両方取得済みのとき）
  if (F_pos && J_pos) {
    let y = 30;
    for (const [fingerIndex, homeKey] of Object.entries(fingerToHome)) {
      const lm = landmarks[Number(fingerIndex)];
      const fx = lm.x * canvas.width;
      const fy = lm.y * canvas.height;

      const ok = isOnHome(fx, fy, homeKey);

      // 指先の色を変える（OK=シアン / NG=黄）
      ctx.beginPath();
      ctx.arc(fx, fy, 8, 0, Math.PI * 2);
      ctx.fillStyle = ok ? "rgba(0,255,255,0.5)" : "rgba(255,200,0,0.5)";
      ctx.fill();

      // 左上テキスト
      ctx.fillStyle = ok ? "cyan" : "yellow";
      ctx.font      = "bold 16px monospace";
      ctx.fillText(`${homeKey}: ${ok ? "✅ OK" : "❌ ズレ"}`, 10, y);
      y += 22;
    }
  }
});
</script>
</body>
</html>
