<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI タイピング診断</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      /* ページ全体スクロールを許可 */
      height: auto;
      overflow: auto;
    }
    body {
      background: #111;
      color: #e8e8e8;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      min-height: 100vh;
    }

    h1 { font-size: 1rem; color: #aaa; letter-spacing: 0.15em; text-transform: uppercase; flex-shrink: 0; }

    /* ── コントロールバーを画面上部に固定 ── */
    #controls {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #111;
      padding: 6px 0;
      border-bottom: 1px solid #222;
    }

    /* ── メインレイアウト ── */
    #main-layout {
      display: flex;
      gap: 14px;
      width: 100%;
      max-width: 1060px;
      align-items: flex-start;  /* 左右それぞれ自然な高さ */
      flex-wrap: nowrap;
    }

    /* ── 左カラム: カメラ＋入力 を画面上部にstickyで固定 ── */
    #cam-section {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      min-width: 0;
      position: sticky;
      top: 52px;   /* controlsの高さ分だけ下げる */
      max-height: calc(100vh - 62px);
      overflow-y: auto;
      overflow-x: hidden;
    }
    #cam-section::-webkit-scrollbar { width: 4px; }
    #cam-section::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    #canvas {
      display: block;
      cursor: crosshair;
      border: 1px solid #333;
      border-radius: 6px;
      width: 100%;
      max-height: 52vh;
      object-fit: contain;
    }
    #canvas.calibrating { border-color: #ffd600; box-shadow: 0 0 0 2px #ffd60033; }
    #status { text-align: center; font-size: 0.82rem; color: #ffd600; margin-top: 5px; }

    /* ── 右カラム: 問題文＋アドバイス（自然に縦伸び・ページスクロールで読む） ── */
    #typing-section {
      flex: 1 1 340px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 300px;
    }

    /* 問題文パネル: ページスクロール中も上部に固定 */
    #prompt-panel {
      position: sticky;
      top: 52px;
      z-index: 10;
      background: #181818;
      border-bottom: 1px solid #333;
    }

    /* 入力エリア（カメラ下） */
    #input-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }

    .panel {
      background: #181818;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 12px 14px;
    }
    .panel-title {
      font-size: 0.72rem;
      color: #666;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* 課題文（日本語） */
    #prompt-ja {
      font-size: 1.3rem;
      line-height: 2.0;
      letter-spacing: 0.1em;
      word-break: break-all;
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      margin-bottom: 6px;
    }

    /* ローマ字表記（参考） */
    #prompt-romaji {
      font-size: 1.25rem;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.12em;
      word-break: break-all;
      line-height: 2.2;
    }

    /* ローマ字の各文字スパン */
    #prompt-romaji .char { position: relative; display: inline; }
    #prompt-romaji .char.correct  { color: #4dff9a; }
    #prompt-romaji .char.wrong    { color: #ff5555; background: #3a1010; border-radius: 2px; }
    #prompt-romaji .char.pending  { color: #444; }
    #prompt-romaji .char.separator { color: #555; letter-spacing: 0; }
    #prompt-romaji .char.cursor::after {
      content: '';
      position: absolute;
      bottom: 0px; left: 0;
      width: 100%; height: 2px;
      background: #ffd600;
      animation: blink 0.9s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* 入力エリア */
    #typing-input {
      width: 100%;
      padding: 12px 14px;
      background: #0e0e0e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e8e8e8;
      font-family: 'Courier New', monospace;
      font-size: 1.1rem;
      line-height: 1.7;
      resize: none;
      outline: none;
      caret-color: #ffd600;
      ime-mode: disabled;
      -webkit-ime-mode: disabled;
      min-height: 80px;
    }
    #typing-input:focus { border-color: #ffd60066; box-shadow: 0 0 0 2px #ffd60011; }
    #typing-input:disabled { opacity: 0.4; cursor: default; }

    /* 統計バー */
    #stats-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .stat-chip {
      background: #222;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.78rem;
      color: #aaa;
    }
    .stat-chip span { color: #fff; font-weight: bold; }

    /* コントロール */
    /* #controls は上部sticky定義に統合済み */
    #controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      width: 100%;
      max-width: 1060px;
    }
    #api-key-wrap { display: flex; gap: 6px; align-items: center; font-size: 0.82rem; flex: 1; min-width: 200px; }
    #api-key-wrap input {
      flex: 1;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #fff;
      font-size: 0.82rem;
    }
    button {
      padding: 7px 16px;
      border-radius: 7px;
      border: 1px solid #333;
      background: #1e1e1e;
      color: #e8e8e8;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: inherit;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: #2a2a2a; }
    button:disabled { opacity: 0.4; cursor: default; }
    button.primary { border-color: #ffd600; color: #ffd600; }
    button.primary:hover:not(:disabled) { background: #1e1a00; }

    /* アドバイスボックス */
    #advice-section { width: 100%; max-width: 1060px; }
    #advice {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 0.86rem;
      line-height: 1.85;
      white-space: pre-wrap;
      min-height: 60px;
      color: #ccc;
      /* ページ全体スクロールで読むため max-height 制限なし */
    }
    #advice.loading { color: #666; animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:0.4 } }

    /* レベルバッジ */
    #level-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: bold;
      letter-spacing: 0.08em;
      border: 1px solid #444;
      background: #1a1a1a;
      color: #aaa;
      transition: all 0.3s;
    }
    #level-badge.beginner  { border-color: #4dff9a55; color: #4dff9a; background: #0a1f12; }
    #level-badge.intermediate { border-color: #ffd60055; color: #ffd600; background: #1a1500; }
    #level-badge.advanced  { border-color: #ff555555; color: #ff8888; background: #1f0a0a; }

    /* レベル選択セレクト */
    #level-select {
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #e8e8e8;
      font-size: 0.82rem;
      cursor: pointer;
    }

    /* スプレッドシート読み込みステータス */
    #sheet-status {
      font-size: 0.75rem;
      color: #555;
      text-align: right;
      margin-top: 3px;
    }
    #sheet-status.ok  { color: #4dff9a66; }
    #sheet-status.err { color: #ff555566; }

    /* 誤字ヒートマップ */
    #heatmap-row {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .error-key {
      background: #3a1010;
      border: 1px solid #ff5555;
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 0.78rem;
      color: #ff9999;
    }

    video { display: none; }

    /* 問題文パネル: カーソルが端に来てもスクロール余白を確保 */
    #prompt-panel { scroll-margin: 20px; }

    /* 入力セクション全体 */
    #input-section { margin-top: 8px; display: flex; flex-direction: column; gap: 8px; }

    /* canvasをwidth:100%に（カメラ下の入力欄と幅を揃える） */
    #canvas { width: 100%; }
  </style>
</head>
<body>

<h1>⌨ AI タイピング診断</h1>

<div id="controls">
  <div id="api-key-wrap">
    <label>名前：</label>
    <input type="text" id="userNameInput" placeholder="ユーザー名を入力" maxlength="30">
  </div>
  <select id="level-select" title="レベルを手動で選択">
    <option value="auto">🔄 自動（WPM判定）</option>
    <option value="beginner">🌱 初級（〜29 WPM）</option>
    <option value="intermediate">⚡ 中級（30〜59 WPM）</option>
    <option value="advanced">🔥 上級（60 WPM〜）</option>
  </select>
  <span id="level-badge">— レベル未定 —</span>
  <button id="newPromptBtn">📝 新しい課題文</button>
  <button id="genAdviceBtn" disabled class="primary">🤖 AI分析・記録</button>
  <button id="resetBtn">↺ リセット</button>
</div>

<div id="main-layout">

  <!-- 左カラム: カメラ＋入力エリア -->
  <div id="cam-section">
    <div id="info" style="text-align:center; font-size:0.8rem; color:#666; margin-bottom:6px;">
      ① Q→P→Z→？→ ② F → ③ J の順にクリック
    </div>
    <video id="cam" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div id="status">カメラ起動中…</div>

    <!-- 入力エリア（カメラ下） -->
    <div id="input-section">
      <textarea
        id="typing-input"
        rows="3"
        placeholder="ローマ字で直接入力（IMEオフ）― Enter で完了"
        disabled
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        inputmode="none"
        lang="en"
      ></textarea>

      <!-- 統計 -->
      <div id="stats-row">
        <div class="stat-chip">正確率 <span id="acc-val">—</span></div>
        <div class="stat-chip">WPM <span id="wpm-val">—</span></div>
        <div class="stat-chip">誤字数 <span id="err-val">—</span></div>
        <div class="stat-chip">進捗 <span id="prog-val">—</span></div>
      </div>

      <!-- 誤字キー -->
      <div class="panel" id="heatmap-panel" style="display:none;">
        <div class="panel-title">よく間違えるキー</div>
        <div id="heatmap-row"></div>
      </div>
    </div>
  </div>

  <!-- 右カラム: 問題文＋アドバイス（スクロール可能） -->
  <div id="typing-section">

    <!-- 課題文パネル -->
    <div class="panel" id="prompt-panel">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
        <div class="panel-title" style="margin-bottom:0;">練習文（日本語）</div>
        <div id="prompt-level-label" style="font-size:0.72rem; color:#666;"></div>
      </div>
      <div id="prompt-ja"></div>
      <div class="panel-title" style="margin-top:10px; color:#ffd60099;">ローマ字（入力対象）</div>
      <div id="prompt-romaji"></div>
      <div id="sheet-status">📋 スプレッドシートを読み込み中…</div>
    </div>

    <!-- アドバイス -->
    <div class="panel">
      <div class="panel-title">AIアドバイス</div>
      <div id="advice">キャリブレーション完了後、課題文を入力して「AI分析・記録」を押してください。</div>
    </div>

  </div>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ═══════════════════════════════════════════════════════
//  DOM
// ═══════════════════════════════════════════════════════
const video        = document.getElementById("cam");
const canvas       = document.getElementById("canvas");
const ctx          = canvas.getContext("2d");
const statusEl     = document.getElementById("status");
const adviceBox    = document.getElementById("advice");
const genBtn       = document.getElementById("genAdviceBtn");
const resetBtn     = document.getElementById("resetBtn");
const newPromptBtn = document.getElementById("newPromptBtn");
const userNameInput = document.getElementById("userNameInput");
const typingInput  = document.getElementById("typing-input");
const promptJaEl   = document.getElementById("prompt-ja");
const promptRmEl   = document.getElementById("prompt-romaji");
const accVal       = document.getElementById("acc-val");
const wpmVal       = document.getElementById("wpm-val");
const errVal       = document.getElementById("err-val");
const progVal      = document.getElementById("prog-val");
const heatmapPanel = document.getElementById("heatmap-panel");
const heatmapRow   = document.getElementById("heatmap-row");

// ═══════════════════════════════════════════════════════
//  かな→ローマ字変換テーブル（JISローマ字）
// ═══════════════════════════════════════════════════════
const KANA_TO_ROMAN = {
  'あ':'a','い':'i','う':'u','え':'e','お':'o',
  'か':'ka','き':'ki','く':'ku','け':'ke','こ':'ko',
  'さ':'sa','し':'si','す':'su','せ':'se','そ':'so',
  'た':'ta','ち':'ti','つ':'tu','て':'te','と':'to',
  'な':'na','に':'ni','ぬ':'nu','ね':'ne','の':'no',
  'は':'ha','ひ':'hi','ふ':'hu','へ':'he','ほ':'ho',
  'ま':'ma','み':'mi','む':'mu','め':'me','も':'mo',
  'や':'ya','ゆ':'yu','よ':'yo',
  'ら':'ra','り':'ri','る':'ru','れ':'re','ろ':'ro',
  'わ':'wa','を':'wo','ん':'nn',
  'が':'ga','ぎ':'gi','ぐ':'gu','げ':'ge','ご':'go',
  'ざ':'za','じ':'zi','ず':'zu','ぜ':'ze','ぞ':'zo',
  'だ':'da','ぢ':'di','づ':'du','で':'de','ど':'do',
  'ば':'ba','び':'bi','ぶ':'bu','べ':'be','ぼ':'bo',
  'ぱ':'pa','ぴ':'pi','ぷ':'pu','ぺ':'pe','ぽ':'po',
  'きゃ':'kya','きゅ':'kyu','きょ':'kyo',
  'しゃ':'sya','しゅ':'syu','しょ':'syo',
  'ちゃ':'tya','ちゅ':'tyu','ちょ':'tyo',
  'にゃ':'nya','にゅ':'nyu','にょ':'nyo',
  'ひゃ':'hya','ひゅ':'hyu','ひょ':'hyo',
  'みゃ':'mya','みゅ':'myu','みょ':'myo',
  'りゃ':'rya','りゅ':'ryu','りょ':'ryo',
  'ぎゃ':'gya','ぎゅ':'gyu','ぎょ':'gyo',
  'じゃ':'zya','じゅ':'zyu','じょ':'zyo',
  'びゃ':'bya','びゅ':'byu','びょ':'byo',
  'ぴゃ':'pya','ぴゅ':'pyu','ぴょ':'pyo',
  'ふぁ':'fa','ふぃ':'fi','ふぇ':'fe','ふぉ':'fo',
  'てぃ':'thi','でぃ':'dhi','とぅ':'twu','どぅ':'dwu',
  'うぃ':'whi','うぇ':'whe','うぉ':'who',
  'ー':'-','。':'. ','、':', ',
};

// 代替ローマ字マッピング（primary → [alt1, alt2, ...]）
// キー: KANA_TO_ROMAN の値（正規表記）, 値: 許容する代替表記の配列
const ROMAJI_ALTS = {
  'zi': ['ji'],
  'zya':['ja'],
  'zyu':['ju'],
  'zyo':['jo'],
};

// ん の後続判定: 母音(a/i/u/e/o)・y・n が続く場合は nn、それ以外/末尾は n
function needsDoubleN(text, i) {
  const next = text[i + 1];
  if (!next) return false;               // 末尾 → n 1個
  if (next === 'ん') return true;         // ん+ん → nn
  // 次のかな（拗音考慮）のローマ字先頭を取得
  const two = next + (text[i + 2] || '');
  const roman = KANA_TO_ROMAN[two] || KANA_TO_ROMAN[next];
  if (!roman) return false;
  return 'aeiouyn'.includes(roman[0].toLowerCase());
}

// ローマ字文字列を「セグメント配列」に変換
// 各セグメント: { primary: "zi", alts: ["ji"] }
// altsが空なら代替なし
function kanaToRomajiSegments(text) {
  const segments = [];
  let i = 0;
  while (i < text.length) {
    // ん の処理:
    //   母音(a/i/u/e/o)・y・n が続く場合 → nn 必須（alt なし）
    //   子音前・末尾             → n が primary、nn も許容
    if (text[i] === 'ん') {
      if (needsDoubleN(text, i)) {
        segments.push({ primary: 'nn', alts: [] });
      } else {
        segments.push({ primary: 'n', alts: ['nn'] });
      }
      i++; continue;
    }
    if (text[i] === 'っ') {
      const two = text[i+1] ? text[i+1] + (text[i+2]||'') : '';
      const one = text[i+1] || '';
      const nr = KANA_TO_ROMAN[two] || KANA_TO_ROMAN[one];
      const cons = nr ? nr[0] : 't';
      segments.push({ primary: cons, alts: [] });
      i++; continue;
    }
    const two = text.slice(i, i+2);
    if (two.length === 2 && KANA_TO_ROMAN[two]) {
      const primary = KANA_TO_ROMAN[two];
      segments.push({ primary, alts: ROMAJI_ALTS[primary] || [] });
      i += 2; continue;
    }
    const ch = text[i];
    const primary = KANA_TO_ROMAN[ch] !== undefined ? KANA_TO_ROMAN[ch] : ch;
    segments.push({ primary, alts: ROMAJI_ALTS[primary] || [] });
    i++;
  }
  return segments;
}

function kanaToRomaji(text) {
  return kanaToRomajiSegments(text).map(s => s.primary).join('');
}

// セグメントリストと typed から表示・判定情報を生成する
//
// 設計方針:
//   - displayTarget は常に primary の連結（表示は変わらない）
//   - typed の各文字がどのセグメントのどの候補に対応するかを追跡
//   - セグメントごとに「どの候補で消費したか」を確定し tIdx を正確に進める
//   - primary と alt で文字数が異なる場合（n vs nn）も正しく処理する
//
// 返り値:
//   displayTarget : primary 連結の表示文字列
//   charStates    : displayTarget の各文字に対応する状態配列
//                   'correct' | 'wrong' | 'cursor' | 'pending'
function matchTypedToSegments(segments, typed) {
  // ── Step1: typed をセグメントに割り当て、各セグメントの消費候補を確定 ──
  // resolved[i] = { cand: 使用候補文字列, complete: 完全一致したか }
  const resolved = [];
  let tIdx = 0;

  for (const seg of segments) {
    // 長い候補を優先（longest match）: nn を n より先に試す
    const candidates = [seg.primary, ...seg.alts].sort((a,b) => b.length - a.length);
    const remaining = typed.length - tIdx;

    if (remaining <= 0) {
      // typed が尽きた：このセグメントは未入力
      resolved.push({ cand: seg.primary, state: 'pending' });
      continue;
    }

    // 完全一致する候補を探す
    let fullMatch = null;
    for (const cand of candidates) {
      if (remaining >= cand.length) {
        let ok = true;
        for (let ci = 0; ci < cand.length; ci++) {
          if (typed[tIdx + ci] !== cand[ci]) { ok = false; break; }
        }
        if (ok) { fullMatch = cand; break; }
      }
    }

    if (fullMatch) {
      resolved.push({ state: 'correct', consumedTyped: fullMatch.length });
      tIdx += fullMatch.length;
      continue;
    }

    // 前方一致する候補を探す（入力途中）
    let prefixMatch = null;
    for (const cand of candidates) {
      const part = typed.slice(tIdx, tIdx + remaining);
      if (cand.startsWith(part)) { prefixMatch = cand; break; }
    }

    if (prefixMatch) {
      resolved.push({ state: 'partial', consumedTyped: remaining });
      tIdx += remaining;
      continue;
    }

    // どの候補にも合わない → 誤入力
    const consume = Math.min(remaining, seg.primary.length);
    resolved.push({ state: 'wrong', consumedTyped: consume });
    tIdx += consume;
  }

  // ── Step2: displayTarget（primary 連結）と charStates を生成 ──
  // displayTarget の各文字位置は primary に対応
  // charStates はそのまま primary の各文字に割り当てる
  const displayParts = [];
  const charStates = [];
  let cursorPlaced = false;

  for (let si = 0; si < segments.length; si++) {
    const primary = segments[si].primary;
    const res = resolved[si];
    displayParts.push(primary);

    for (let ci = 0; ci < primary.length; ci++) {
      if (res.state === 'correct') {
        // 完全一致（alt含む）→ primary 全文字を correct
        charStates.push('correct');
      } else if (res.state === 'wrong') {
        charStates.push(ci < res.consumedTyped ? 'wrong' : 'pending');
      } else if (res.state === 'partial') {
        // 入力中：primary の先頭から consumedTyped 文字分は correct、
        // 次の1文字がカーソル、残りは pending
        if (ci < res.consumedTyped) {
          charStates.push('correct');
        } else if (!cursorPlaced) {
          charStates.push('cursor');
          cursorPlaced = true;
        } else {
          charStates.push('pending');
        }
      } else {
        // pending
        if (!cursorPlaced) {
          charStates.push('cursor');
          cursorPlaced = true;
        } else {
          charStates.push('pending');
        }
      }
    }
  }

  return {
    displayTarget: displayParts.join(''),
    charStates,
    totalLen: displayParts.join('').length,
  };
}

// セグメントと typed から「期待文字配列」を生成（誤字カウント用）
// expected[i] = typed[i] が正解のとき一致すべき文字
function getExpectedAtPosition(segments, typed) {
  const expected = [];
  let tIdx = 0;

  for (const seg of segments) {
    const candidates = [seg.primary, ...seg.alts].sort((a,b) => b.length - a.length);
    const remaining = typed.length - tIdx;
    if (remaining <= 0) { seg.primary.split('').forEach(c => expected.push(c)); continue; }

    // 完全一致候補
    let matched = null;
    for (const cand of candidates) {
      if (remaining >= cand.length) {
        let ok = true;
        for (let ci = 0; ci < cand.length; ci++) {
          if (typed[tIdx + ci] !== cand[ci]) { ok = false; break; }
        }
        if (ok) { matched = cand; break; }
      }
    }
    // 前方一致候補
    if (!matched) {
      for (const cand of candidates) {
        const part = typed.slice(tIdx, tIdx + cand.length);
        if (cand.startsWith(part)) { matched = cand; break; }
      }
    }

    const use = matched || seg.primary;
    use.split('').forEach(c => expected.push(c));
    tIdx += use.length;
  }
  return expected;
}

  if (wpm < LEVEL_THRESHOLDS.beginner)    return 'beginner';

  return 'advanced';

const GAS_SENTENCES_URL = "https://script.google.com/macros/s/AKfycbzv1kDh85Y2cYjJafdNurSySj5BVNgPeYvqyuAgplsCwxObL3LDirL5j7U44DDxltuXew/exec"; // ← 問題文読み込み用GASウェブアプリのURLをここに貼り付け

const sheetStatusEl = document.getElementById("sheet-status");

async function loadSentencesFromSheet() {
  if (!GAS_SENTENCES_URL) {
    sheetStatusEl.textContent = "📋 GAS URLが未設定のため、ローカルデータを使用中";
    sheetStatusEl.className = "";
    return;
  }
  sheetStatusEl.textContent = "📋 スプレッドシートを読み込み中…";
  sheetStatusEl.className = "";
  try {
    const res = await fetch(GAS_SENTENCES_URL);
    const json = await res.json();
    // 期待するJSON形式:
    // { beginner: [{display:"...", kana:"..."},...], intermediate:[...], advanced:[...] }
    let loaded = 0;
    ['beginner','intermediate','advanced'].forEach(lv => {
      if (json[lv] && Array.isArray(json[lv]) && json[lv].length > 0) {
        SENTENCE_POOL[lv] = json[lv];
        loaded += json[lv].length;
      }
    });
    sheetStatusEl.textContent = `✅ スプレッドシートから ${loaded} 件の問題文を読み込みました`;
    sheetStatusEl.className = "ok";
  } catch (e) {
    sheetStatusEl.textContent = `⚠️ スプレッドシート読み込み失敗（ローカルデータを使用中）`;
    sheetStatusEl.className = "err";
  }
}

// プールからn文をランダムに選んで重複なしで返す（レベル対応）
function sampleSentences(n) {
  const pool = [...(SENTENCE_POOL[currentLevel] || SENTENCE_POOL_LOCAL.beginner)];
  const result = [];
  for (let i = 0; i < n && pool.length > 0; i++) {
    const idx = Math.floor(Math.random() * pool.length);
    result.push(pool.splice(idx, 1)[0]);
  }
  return result;
}

  updateLevelBadge(currentLevel);
  const sentences = sampleSentences(4);

  };
  currentRomaji    = kanaToRomaji(currentPromptObj.kana);
  currentSegments  = kanaToRomajiSegments(currentPromptObj.kana);
  typingStartTime  = null;
  typingFinished   = false;
  missedKeys       = {};
  typingInput.value    = "";
  typingInput.disabled = false;

// セグメントをキャッシュ（currentRomaji が変わるたびに再生成）
let currentSegments = [];

// ローマ字行をchar単位で色付けレンダリング
function renderRomaji(typed) {
  if (currentSegments.length === 0) {
    promptRmEl.innerHTML = "";
    return;
  }
  const { charStates, displayTarget } = matchTypedToSegments(currentSegments, typed);
  const cursorPos = typed.length;
  promptRmEl.innerHTML = displayTarget.split("").map((ch, i) => {
    const cls  = charStates[i] || "pending";
    const isCursor = (i === cursorPos);
    const safe = ch === " " ? "＿" : ch.replace(/&/g,"&amp;").replace(/</g,"&lt;");
    return `<span class="char ${cls}${isCursor ? ' cursor' : ''}">${safe}</span>`;
  }).join("");

  // ── カーソルが見えるように #prompt-romaji コンテナのみスクロール ──
  // scrollIntoView は使わない（パネル全体が動いて問題文が隠れるため）
  const cursorEl = promptRmEl.querySelector('.cursor');
  if (cursorEl) {
    // promptRmEl自体はoverflow:visibleなので、
    // 親の #typing-section の scrollTop を操作する
    const panel      = document.getElementById('typing-section');
    const romajiTop  = promptRmEl.getBoundingClientRect().top;
    const panelTop   = panel.getBoundingClientRect().top;
    const cursorTop  = cursorEl.getBoundingClientRect().top;
    const cursorBot  = cursorEl.getBoundingClientRect().bottom;
    const panelBot   = panel.getBoundingClientRect().bottom;

    // カーソルが下端から80px以内に入ったらスクロール（上端には動かさない）
    if (cursorBot > panelBot - 80) {
      const delta = cursorBot - (panelBot - 80);
      panel.scrollTop += delta;
    }
    // カーソルが上に隠れた場合は戻す
    if (cursorTop < panelTop + 10) {
      const delta = panelTop + 10 - cursorTop;
      panel.scrollTop -= delta;
    }
  }
}

function updateStats(typed) {
  const { displayTarget } = matchTypedToSegments(currentSegments, typed);
  const target = displayTarget;
  const done   = Math.min(typed.length, target.length);
  let errors   = 0;
  // セグメントベースで期待文字と比較
  const expected = getExpectedAtPosition(currentSegments, typed);
  for (let i = 0; i < done; i++) {
    if (typed[i] !== (expected[i] ?? target[i])) errors++;
  }
  const acc  = done === 0 ? "—" : `${Math.round((1 - errors/done)*100)}%`;
  const prog = `${done}/${currentRomaji.length}`;

  let wpm = "—";
  if (typingStartTime && done > 0) {
    const elapsed = (Date.now() - typingStartTime) / 60000;
    wpm = Math.round((done / 5) / elapsed);
  }

  accVal.textContent  = acc;
  wpmVal.textContent  = wpm;
  errVal.textContent  = errors;
  progVal.textContent = prog;
}

function updateHeatmap() {
  const sorted = Object.entries(missedKeys).sort((a,b) => b[1]-a[1]).slice(0, 10);
  if (sorted.length === 0) { heatmapPanel.style.display = "none"; return; }
  heatmapPanel.style.display = "";
  heatmapRow.innerHTML = sorted.map(([k, n]) =>
    `<div class="error-key">${k} ×${n}</div>`
  ).join("");
}

// IMEによる日本語入力をブロックする（compositionstart で内容を破棄）
typingInput.addEventListener("compositionstart", () => {
  // IMEが起動したら入力を即キャンセル
  const before = typingInput.value;
  setTimeout(() => { typingInput.value = before; }, 0);
});

typingInput.addEventListener("input", e => {
  // IME確定文字（非ASCII）を除去
  const cleaned = typingInput.value.replace(/[^ -~]/g, "");
  if (cleaned !== typingInput.value) {
    typingInput.value = cleaned;
  }

  const typed = typingInput.value;

  // タイマー開始
  if (!typingStartTime && typed.length > 0) typingStartTime = Date.now();

  // ミスキー収集（セグメント対応）
  if (typed.length > 0) {
    const expected = getExpectedAtPosition(currentSegments, typed);
    const i = typed.length - 1;
    if (i < currentRomaji.length && typed[i] !== (expected[i] ?? currentRomaji[i])) {
      const k = expected[i] ?? currentRomaji[i];
      missedKeys[k] = (missedKeys[k] || 0) + 1;
    }
  }

  renderRomaji(typed);
  updateStats(typed);
  updateHeatmap();

  // 完了判定：入力済み文字数がローマ字全長に達したら完了
  if (typed.length >= currentRomaji.length && !typingFinished) {
    typingFinished = true;
    typingInput.disabled = true;
    if (calibDone) genBtn.disabled = false;
    // WPMを確定してレベルを自動更新
    if (typingStartTime) {
      const elapsed = (Date.now() - typingStartTime) / 60000;
      const finalWpm = Math.round((typed.length / 5) / elapsed);
      lastWpm = finalWpm;
      autoUpdateLevel(finalWpm);
    }
  }
});

// Enterキーでも入力完了とし、AI分析を有効化
typingInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    e.preventDefault();
    if (!typingFinished && typingInput.value.length > 0) {
      typingFinished = true;
      typingInput.disabled = true;
      if (calibDone) genBtn.disabled = false;
      renderRomaji(typingInput.value);
      updateStats(typingInput.value);
      updateHeatmap();
      // WPMを確定してレベルを自動更新
      if (typingStartTime) {
        const elapsed = (Date.now() - typingStartTime) / 60000;
        const finalWpm = Math.round((typingInput.value.length / 5) / elapsed);
        lastWpm = finalWpm;
        autoUpdateLevel(finalWpm);
      }
    }
  }
});

// ═══════════════════════════════════════════════════════
//  キャリブレーション
// ═══════════════════════════════════════════════════════
const CORNER_LABELS = ["Q（左上）","P（右上）","Z（左下）","？（右下）","F","J"];
const CORNER_COLORS = ["#ff4d4d","#4daaff","#ffaa00","#44dd88","#ff88ff","#88ffff"];

const KB_ROWS = [
  { keys: ["Q","W","E","R","T","Y","U","I","O","P"], rowOffset: 0.00 },
  { keys: ["A","S","D","F","G","H","J","K","L",";"], rowOffset: 0.05 },
  { keys: ["Z","X","C","V","B","N","M",",",".","/"], rowOffset: 0.12 },
];
const NUM_ROWS = KB_ROWS.length;
const MAX_COLS = Math.max(...KB_ROWS.map(r => r.keys.length));

let clickStep = 0;
let corners   = [];
let F_pos = null, J_pos = null;
let keys      = [];
let calibDone = false;

function getCanvasXY(e) {
  const rect   = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  return { x:(e.clientX-rect.left)*scaleX, y:(e.clientY-rect.top)*scaleY };
}

canvas.addEventListener("click", e => {
  if (clickStep >= 6) return;
  const {x,y} = getCanvasXY(e);

  if (clickStep < 4) {
    corners.push({x,y}); clickStep++;
    if (clickStep < 4) {
      statusEl.textContent = `${CORNER_LABELS[clickStep]} をクリック (${clickStep}/4)`;
    } else {
      generateKeyPositions();
      statusEl.textContent = "F の位置をクリック (5/6)";
    }
  } else if (clickStep === 4) {
    F_pos = {x,y};
    const f = keys.find(k=>k.key==="F"); if(f){f.x=x;f.y=y;}
    clickStep++;
    statusEl.textContent = "J の位置をクリック (6/6)";
  } else {
    J_pos = {x,y};
    const j = keys.find(k=>k.key==="J"); if(j){j.x=x;j.y=y;}
    clickStep++;
    calibDone = true;
    canvas.classList.remove("calibrating");
    statusEl.textContent = "✅ キャリブレーション完了";
    // 課題文が終わっていればボタン有効
    if (typingFinished) genBtn.disabled = false;
    typingInput.disabled = false;
  }
});

function generateKeyPositions() {
  const [Q,P,Z,Hq] = corners;
  keys = [];
  KB_ROWS.forEach((row,ri) => {
    const rowT = ri/(NUM_ROWS-1);
    const lx=Q.x+(Z.x-Q.x)*rowT, ly=Q.y+(Z.y-Q.y)*rowT;
    const rx=P.x+(Hq.x-P.x)*rowT, ry=P.y+(Hq.y-P.y)*rowT;
    row.keys.forEach((key,ci) => {
      const colT=(ci+row.rowOffset)/(MAX_COLS-1);
      keys.push({key, x:lx+(rx-lx)*colT, y:ly+(ry-ly)*colT});
    });
  });
}

// ═══════════════════════════════════════════════════════
//  ユーティリティ
// ═══════════════════════════════════════════════════════
function dist(ax,ay,bx,by){return Math.hypot(ax-bx,ay-by);}
function vecAngleDeg(v1,v2){
  const dot=v1.x*v2.x+v1.y*v2.y;
  const mag=Math.hypot(v1.x,v1.y)*Math.hypot(v2.x,v2.y);
  if(mag===0)return 0;
  return Math.acos(Math.max(-1,Math.min(1,dot/mag)))*180/Math.PI;
}

const LEFT_FINGER_HOME  = {8:"F",12:"D",16:"S",20:"A"};
const RIGHT_FINGER_HOME = {8:"J",12:"K",16:"L",20:";"};
const HOME_THRESHOLD = 40;
function isOnHome(fx,fy,k){
  const kp=keys.find(p=>p.key===k); if(!kp)return false;
  return dist(fx,fy,kp.x,kp.y)<HOME_THRESHOLD;
}

function calcWristAngles(lm,side){
  const w=lm[0],m9=lm[9],m12=lm[12],i5=lm[5];
  const vLong={x:m9.x-w.x, y:m9.y-w.y};
  const vFlex={x:m12.x-w.x,y:m12.y-w.y};
  const vSide={x:i5.x-w.x, y:i5.y-w.y};
  const upDown=vecAngleDeg(vLong,vFlex);
  const lateral=vecAngleDeg(vLong,vSide);
  const upDownType=(m12.y<m9.y)?"背屈（反り）":"掌屈（曲げ）";
  let sideType;
  if(side==="left") sideType=(i5.x>m9.x)?"橈屈（外側）":"尺屈（内側）";
  else              sideType=(i5.x<m9.x)?"橈屈（外側）":"尺屈（内側）";
  return{upDown,upDownType,lateral,sideType,wristZ:w.z};
}

const TIP_INDICES=[8,12,16,20];
let prevPosL={},prevPosR={};
let moveDistL=Object.fromEntries(TIP_INDICES.map(i=>[i,0]));
let moveDistR=Object.fromEntries(TIP_INDICES.map(i=>[i,0]));
let homeTotal=0,homeCorrect=0;

let latestMetrics={homeRate:0,leftAngles:null,rightAngles:null,moveDistL,moveDistR};

// ═══════════════════════════════════════════════════════
//  スコア
// ═══════════════════════════════════════════════════════
function wristScore(deg) {return deg<15?25:deg<30?15:deg<45?5:0;}
function lateralScore(deg){return deg<10?15:deg<20?8:deg<30?3:0;}
function moveScore(px)    {return px<500?10:px<1000?7:px<2000?3:0;}
function calcTotalScore(homeRate,lA,rA,mdL,mdR){
  const homeS=homeRate*40;
  let wristS=0,sideS=0,balanceS=0,floatS=0,moveS=0;
  if(lA&&rA){
    wristS=(wristScore(lA.upDown)+wristScore(rA.upDown))/2;
    sideS=(lateralScore(lA.lateral)+lateralScore(rA.lateral));
    const diff=Math.abs(lA.upDown-rA.upDown);
    balanceS=diff<5?5:diff<10?3:diff<20?1:0;
    const zDiff=Math.abs(lA.wristZ-rA.wristZ);
    floatS=zDiff<0.03?5:zDiff<0.07?3:0;
  }
  const totalMove=TIP_INDICES.reduce((s,i)=>s+(mdL[i]||0)+(mdR[i]||0),0);
  moveS=moveScore(totalMove);
  return Math.min(100,Math.round(homeS+wristS+sideS+balanceS+floatS+moveS));
}

// ═══════════════════════════════════════════════════════
//  カメラ静止画キャプチャ
// ═══════════════════════════════════════════════════════
function captureFrame() {
  const snap = document.createElement("canvas");
  snap.width  = canvas.width;
  snap.height = canvas.height;
  snap.getContext("2d").drawImage(canvas, 0, 0);
  // base64（jpeg, 品質0.7）
  return snap.toDataURL("image/jpeg", 0.7).split(",")[1];
}

// ═══════════════════════════════════════════════════════
//  Groq API — テキスト+画像統合アドバイス（GAS経由）
// ═══════════════════════════════════════════════════════
async function generateAdvice(postureIssues, typingData) {
  const imageBase64 = captureFrame();
  return await generateAdviceViaGAS(postureIssues, typingData, imageBase64);
}

// ═══════════════════════════════════════════════════════
//  GAS経由でAIアドバイス生成＆スプレッドシート記録
//  google.script.run を使用（GASウェブアプリ限定）
// ═══════════════════════════════════════════════════════
function generateAdviceViaGAS(postureIssues, typingData, imageBase64) {
  return new Promise((resolve) => {
    const {
      typed, prompt, promptDisplay,
      accuracy, wpm, errors,
      missedKeysSorted
    } = typingData;

    const missedStr = missedKeysSorted.length > 0
      ? missedKeysSorted.map(([k,n])=>`「${k}」${n}回`).join("、")
      : "なし";

    const systemPrompt = `あなたはローマ字入力タイピング指導と姿勢改善の専門コーチです。
ウェブカメラで撮影した手元の画像と、タイピングテストの結果データを組み合わせて分析し、
具体的で実践的なアドバイスを日本語で提供してください。`;

    const userPrompt = `## タイピングテスト結果（ローマ字入力）

- 課題文（日本語）: 「${promptDisplay}」
- 入力対象ローマ字: "${prompt}"
- ユーザーの入力: "${typed}"
- 正確率: ${accuracy}%
- WPM（1分あたり語数）: ${wpm}
- 誤字数: ${errors}文字
- よく間違えたローマ字キー: ${missedStr}

## 姿勢センサーデータ
${postureIssues.length > 0
  ? postureIssues.map(i=>"- "+i).join("\n")
  : "- 姿勢に大きな問題は検出されませんでした"}

## 添付画像について
添付の画像はタイピング中の手元をウェブカメラで撮影したものです。
画像から読み取れる手の位置・指の動き・手首の状態も考慮してください。

## 出力形式（必ずこの形式で）
【タイピングへのアドバイス】
（正確率・速度・よく間違えるキーについて2〜3文）

【姿勢・手首へのアドバイス】
（手首角度・ホームポジション・指の動きについて2〜3文）

【今すぐできる改善1点】
（最も重要な改善ポイントを一言で）

- 専門用語を使いすぎない
- 初心者にわかりやすく
- 励ます口調で`;

    const {homeRate, moveDistL, moveDistR} = latestMetrics;
    const totalMove = [8,12,16,20].reduce((s,i)=>s+(moveDistL[i]||0)+(moveDistR[i]||0),0);
    const score = calcTotalScore(
      homeRate,
      latestMetrics.leftAngles,
      latestMetrics.rightAngles,
      moveDistL,
      moveDistR
    );

    const payload = {
      userName:      userNameInput.value.trim() || "（未入力）",
      systemPrompt:  systemPrompt,
      userPrompt:    userPrompt,
      imageBase64:   imageBase64 || "",
      promptDisplay: promptDisplay,
      accuracy:      accuracy,
      wpm:           wpm,
      errors:        errors,
      missedKeys:    missedStr,
      postureIssues: postureIssues.join("、") || "問題なし",
      homeRate:      homeRate,
      score:         score,
      level:         currentLevel,
    };

    // ── GASウェブアプリのURLをここに貼り付けてください ──
    // デプロイ後に発行されるURL例:
    // https://script.google.com/macros/s/AKfycbx.../exec
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzv1kDh85Y2cYjJafdNurSySj5BVNgPeYvqyuAgplsCwxObL3LDirL5j7U44DDxltuXew/exec"; // ← 要変更

    fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" }, // GASのCORS制限回避
      body: JSON.stringify(payload),
    })
      .then(r => r.json())
      .then(result => {
        const msg = result.saved
          ? result.advice + "\n\n✅ 記録をスプレッドシートに保存しました。"
          : result.advice;
        resolve(msg);
      })
      .catch(err => {
        resolve("⚠️ GAS通信エラー: " + err.message);
      });
  });
}

// ═══════════════════════════════════════════════════════
//  AI分析ボタン
// ═══════════════════════════════════════════════════════
genBtn.addEventListener("click", async () => {
  const {homeRate,leftAngles,rightAngles,moveDistL,moveDistR} = latestMetrics;
  const postureIssues = [];

  if(homeRate < 0.7)
    postureIssues.push(`ホームポジション維持率が低い（${Math.round(homeRate*100)}%）`);
  if(leftAngles){
    if(leftAngles.upDown>30) postureIssues.push(`左手首が反りすぎ（背屈 ${leftAngles.upDown.toFixed(0)}°）`);
    if(leftAngles.lateral>20 && leftAngles.sideType==="尺屈（内側）") postureIssues.push("左手首が内側に曲がりすぎ（尺屈）");
  }
  if(rightAngles){
    if(rightAngles.upDown>30) postureIssues.push(`右手首が反りすぎ（背屈 ${rightAngles.upDown.toFixed(0)}°）`);
    if(rightAngles.lateral>20 && rightAngles.sideType==="尺屈（内側）") postureIssues.push("右手首が内側に曲がりすぎ（尺屈）");
  }
  if((moveDistL[20]||0)<200 && (moveDistR[20]||0)<200) postureIssues.push("小指がほとんど使われていない");

  // タイピングデータ集計（ローマ字ベース）
  const typed  = typingInput.value;
  const target = currentRomaji;               // 入力対象ローマ字
  const promptDisplay = currentPromptObj ? currentPromptObj.display : "";
  const done   = Math.min(typed.length, target.length);
  let errors   = 0;
  const expected = getExpectedAtPosition(currentSegments, typed);
  for(let i=0;i<done;i++) if(typed[i]!==(expected[i]??target[i])) errors++;
  const accuracy = done===0?0:Math.round((1-errors/done)*100);
  const wpm      = lastWpm > 0 ? lastWpm : (typingStartTime ? Math.round((done/5)/((Date.now()-typingStartTime)/60000)) : 0);
  const missedKeysSorted = Object.entries(missedKeys).sort((a,b)=>b[1]-a[1]).slice(0,6);

  genBtn.disabled = true;
  adviceBox.className = "loading";
  adviceBox.textContent = "🤖 タイピング結果と姿勢データを分析中…（GAS経由でGroq APIに接続中）";

  try {
    const result = await generateAdvice(postureIssues, {
      typed, prompt: target, promptDisplay, accuracy, wpm, errors, missedKeysSorted
    });
    adviceBox.className = "";
    adviceBox.textContent = result;
    // ページをアドバイス欄まで自動スクロール
    adviceBox.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch(e) {
    adviceBox.className = "";
    adviceBox.textContent = `⚠️ エラー: ${e.message}`;
  }
  genBtn.disabled = false;
});

// ═══════════════════════════════════════════════════════
//  リセット
// ═══════════════════════════════════════════════════════
resetBtn.addEventListener("click", () => {
  clickStep=0; corners=[]; F_pos=null; J_pos=null;
  keys=[]; calibDone=false;
  prevPosL={}; prevPosR={};
  moveDistL=Object.fromEntries(TIP_INDICES.map(i=>[i,0]));
  moveDistR=Object.fromEntries(TIP_INDICES.map(i=>[i,0]));
  homeTotal=0; homeCorrect=0;
  latestMetrics={homeRate:0,leftAngles:null,rightAngles:null,moveDistL,moveDistR};
  canvas.classList.add("calibrating");
  statusEl.textContent="Q（左上）をクリック (0/4)";
  adviceBox.className="";
  adviceBox.textContent="キャリブレーション完了後、課題文を入力して「AI分析・記録」を押してください。";
  genBtn.disabled=true;
  typingInput.disabled=true;
  pickPrompt();
});

// ═══════════════════════════════════════════════════════
//  描画ヘルパー
// ═══════════════════════════════════════════════════════
function drawKeyOverlay(){
  const homeKeys=new Set([...Object.values(LEFT_FINGER_HOME),...Object.values(RIGHT_FINGER_HOME)]);
  for(const k of keys){
    const isHome=homeKeys.has(k.key);
    ctx.beginPath(); ctx.arc(k.x,k.y,isHome?8:4,0,Math.PI*2);
    ctx.fillStyle  =isHome?"rgba(0,210,255,0.2)":"rgba(255,255,255,0.08)";
    ctx.strokeStyle=isHome?"rgba(0,210,255,0.7)":"rgba(255,255,255,0.25)";
    ctx.lineWidth=1; ctx.fill(); ctx.stroke();
    ctx.fillStyle=isHome?"rgba(0,210,255,0.85)":"rgba(255,255,255,0.45)";
    ctx.font=isHome?"bold 10px monospace":"9px monospace";
    ctx.fillText(k.key,k.x-4,k.y+3);
  }
}

function drawCalibPoints(){
  corners.forEach((p,i)=>{
    ctx.beginPath(); ctx.arc(p.x,p.y,7,0,Math.PI*2);
    ctx.strokeStyle=CORNER_COLORS[i]; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle=CORNER_COLORS[i]; ctx.font="bold 12px sans-serif";
    ctx.fillText(["Q","P","Z","？"][i],p.x+10,p.y-6);
  });
  if(F_pos){
    ctx.beginPath(); ctx.arc(F_pos.x,F_pos.y,7,0,Math.PI*2);
    ctx.strokeStyle=CORNER_COLORS[4]; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle=CORNER_COLORS[4]; ctx.font="bold 12px sans-serif";
    ctx.fillText("F",F_pos.x+10,F_pos.y-6);
  }
  if(J_pos){
    ctx.beginPath(); ctx.arc(J_pos.x,J_pos.y,7,0,Math.PI*2);
    ctx.strokeStyle=CORNER_COLORS[5]; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle=CORNER_COLORS[5]; ctx.font="bold 12px sans-serif";
    ctx.fillText("J",J_pos.x+10,J_pos.y-6);
  }
}

// ═══════════════════════════════════════════════════════
//  MediaPipe Hands
// ═══════════════════════════════════════════════════════
const hands=new Hands({
  locateFile:file=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});
hands.setOptions({
  maxNumHands:2,
  modelComplexity:1,
  minDetectionConfidence:0.7,
  minTrackingConfidence:0.7,
});

hands.onResults(results=>{
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(results.image,0,0,canvas.width,canvas.height);

  if(!calibDone) drawCalibPoints();
  if(keys.length>0) drawKeyOverlay();

  if(!results.multiHandLandmarks||results.multiHandLandmarks.length===0) return;

  let leftHand=null, rightHand=null;
  for(let i=0;i<results.multiHandLandmarks.length;i++){
    const label=results.multiHandedness[i].label;
    if(label==="Right") leftHand=results.multiHandLandmarks[i];
    else                 rightHand=results.multiHandLandmarks[i];
  }

  for(const hand of results.multiHandLandmarks){
    drawConnectors(ctx,hand,HAND_CONNECTIONS,{color:"#00FF00",lineWidth:2});
    drawLandmarks(ctx,hand,{color:"#FF0000",radius:3});
  }

  ctx.font="bold 14px monospace";

  if(leftHand&&calibDone){
    homeTotal++;
    let correct=0;
    const total=Object.keys(LEFT_FINGER_HOME).length;
    let ty=30;
    for(const [fi,homeKey] of Object.entries(LEFT_FINGER_HOME)){
      const lm=leftHand[Number(fi)];
      const fx=lm.x*canvas.width, fy=lm.y*canvas.height;
      const ok=isOnHome(fx,fy,homeKey);
      if(ok) correct++;
      if(prevPosL[fi]) moveDistL[fi]+=dist(fx,fy,prevPosL[fi].x,prevPosL[fi].y);
      prevPosL[fi]={x:fx,y:fy};
      ctx.fillStyle=ok?"cyan":"yellow";
      ctx.fillText(`L ${homeKey}:${ok?"✅":"❌"}`,10,ty); ty+=18;
    }
    homeCorrect+=correct/total;
  }

  if(rightHand&&calibDone){
    let ty=30;
    for(const [fi,homeKey] of Object.entries(RIGHT_FINGER_HOME)){
      const lm=rightHand[Number(fi)];
      const fx=lm.x*canvas.width, fy=lm.y*canvas.height;
      const ok=isOnHome(fx,fy,homeKey);
      if(prevPosR[fi]) moveDistR[fi]+=dist(fx,fy,prevPosR[fi].x,prevPosR[fi].y);
      prevPosR[fi]={x:fx,y:fy};
      ctx.fillStyle=ok?"cyan":"yellow";
      ctx.fillText(`R ${homeKey}:${ok?"✅":"❌"}`,canvas.width-100,ty); ty+=18;
    }
  }

  let leftAngles=null, rightAngles=null;
  if(leftHand){
    leftAngles=calcWristAngles(leftHand,"left");
    ctx.fillStyle="cyan"; ctx.font="12px sans-serif";
    ctx.fillText(`L 上下:${leftAngles.upDown.toFixed(1)}° ${leftAngles.upDownType}`,10,canvas.height-44);
    ctx.fillText(`L 左右:${leftAngles.lateral.toFixed(1)}° ${leftAngles.sideType}`,10,canvas.height-28);
  }
  if(rightHand){
    rightAngles=calcWristAngles(rightHand,"right");
    ctx.fillStyle="yellow"; ctx.font="12px sans-serif";
    ctx.fillText(`R 上下:${rightAngles.upDown.toFixed(1)}° ${rightAngles.upDownType}`,10,canvas.height-14);
    ctx.fillText(`R 左右:${rightAngles.lateral.toFixed(1)}° ${rightAngles.sideType}`,canvas.width/2,canvas.height-14);
  }

  const homeRate=homeTotal>0?homeCorrect/homeTotal:0;
  const finalScore=calcTotalScore(homeRate,leftAngles,rightAngles,moveDistL,moveDistR);

  ctx.fillStyle="white"; ctx.font="bold 13px monospace";
  ctx.fillText(`ホーム:${(homeRate*100).toFixed(0)}% | スコア:${finalScore}/100`,10,canvas.height-60);

  latestMetrics={homeRate,leftAngles,rightAngles,moveDistL,moveDistR};
});

    updateLevelBadge(currentLevel);
    loadSentencesFromSheet().then(() => pickPrompt());
  });
</script>
